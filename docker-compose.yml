services:
  icpx:
    build:
      context: .
    image: icpx-payments-dev
    working_dir: /workspace
    volumes:
      - .:/workspace
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - target:/workspace/target
    command: cargo test --workspace

volumes:
  cargo-registry:
  cargo-git:
  target:
